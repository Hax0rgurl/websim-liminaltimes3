name: Publish static site to gh-pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          rm -rf _site
          mkdir -p _site
          rsync -av --exclude='.git' --exclude='.github' --exclude='_site' ./ _site/
          python3 - <<'PY'
          import re
          from pathlib import Path

          for path in Path('_site').rglob('*.html'):
              html = path.read_text(encoding='utf-8')
              html = re.sub(r'(?im)^[ \t]*<base\s+href=["\'][^"\']*["\']>\s*\n?', '', html)
              path.write_text(html, encoding='utf-8')
          PY
          touch _site/.nojekyll

      - name: Publish gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd _site
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b gh-pages
          git add .
          git commit -m "Publish GitHub Pages"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
